    <style>

            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

            --primary: #1e3c72;
            --secondary: #2a5298;
            --accent: #00d4ff;
            --warning: #ff6b35;
            --success: #2ecc71;
            --danger: #e74c3c;
            --light: #ecf0f1;
        }

        body {
            font-family: 'Fira Code', 'Monaco', 'Courier New', monospace;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            min-height: 100vh;
            padding: 20px;
            color: #333;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 10px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        /* ========== Header ========== */
        header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            color: white;
            padding: 40px 30px;
            text-align: center;
            border-bottom: 3px solid var(--accent);
        }

        header h1 {
            font-size: 2.8em;
            margin-bottom: 5px;
            font-weight: 900;
            letter-spacing: 2px;
            text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.4);
        }

        header .subtitle {
            font-size: 1em;
            opacity: 0.95;
            margin-bottom: 10px;
            letter-spacing: 1px;
        }

        header .description {
            font-size: 0.95em;
            opacity: 0.85;
            font-style: italic;
            max-width: 800px;
            margin: 0 auto;
        }

        /* ========== Navigation ========== */
        .breadcrumb {
            padding: 15px 30px;
            background: #f8f9fa;
            border-bottom: 1px solid #e0e0e0;
            display: none;
        }

        .breadcrumb.show {
            display: block;
        }

        .breadcrumb a {
            color: var(--primary);
            cursor: pointer;
            text-decoration: none;
            margin-right: 10px;
        }

        .breadcrumb a:hover {
            color: var(--accent);
            text-decoration: underline;
        }

        .breadcrumb span {
            color: #999;
            margin: 0 5px;
        }

        /* ========== 首页 - 大纲视图 ========== */
        #indexPage {
            display: block;
        }

        #detailPage {
            display: none;
        }

        .controls {
            padding: 25px 30px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            background: linear-gradient(to bottom, #f8f9fa, #f0f2f5);
            border-bottom: 2px solid #e0e0e0;
        }

        .search-box {
            flex: 1;
            min-width: 280px;
            padding: 12px 18px;
            border: 2px solid var(--primary);
            border-radius: 8px;
            font-size: 1em;
            font-family: 'Fira Code', monospace;
            transition: all 0.3s ease;
            background: white;
        }

        .search-box:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.4);
        }

        .category-filter, .difficulty-filter {
            padding: 12px 18px;
            border: 2px solid var(--secondary);
            border-radius: 8px;
            background: white;
            cursor: pointer;
            font-size: 0.95em;
            font-family: 'Fira Code', monospace;
            transition: all 0.3s ease;
        }

        .category-filter:hover, .difficulty-filter:hover {
            border-color: var(--accent);
            box-shadow: 0 4px 12px rgba(0, 212, 255, 0.2);
        }

        /* ========== 首页内容 - 卡片网格 ========== */
        .index-content {
            padding: 30px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .topic-card {
            background: white;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            cursor: pointer;
            transition: all 0.3s ease;
            border-left: 5px solid var(--primary);
            display: flex;
            flex-direction: column;
        }

        .topic-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 12px 35px rgba(0, 0, 0, 0.2);
            border-left-color: var(--accent);
        }

        .topic-card.category-basic {
            border-top: 4px solid #3498db;
        }

        .topic-card.category-data {
            border-top: 4px solid #9b59b6;
        }

        .topic-card.category-control {
            border-top: 4px solid #e67e22;
        }

        .topic-card.category-function {
            border-top: 4px solid #1abc9c;
        }

        .topic-card-header {
            padding: 20px;
            background: linear-gradient(135deg, rgba(30, 60, 114, 0.05), rgba(42, 82, 152, 0.05));
            border-bottom: 2px solid #f0f0f0;
        }

        .topic-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.8em;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            background: #e3f2fd;
            color: #1565c0;
            margin-bottom: 10px;
        }

        .topic-card-title {
            font-size: 1.4em;
            font-weight: bold;
            color: var(--primary);
            margin-bottom: 5px;
        }

        .topic-card-english {
            font-size: 0.9em;
            color: #666;
            font-style: italic;
        }

        .topic-card-body {
            padding: 20px;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .topic-preview {
            color: #666;
            line-height: 1.6;
            font-size: 0.9em;
            margin-bottom: 15px;
            flex: 1;
        }

        .topic-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 15px;
            border-top: 1px solid #f0f0f0;
            font-size: 0.85em;
        }

        .difficulty-badge {
            background: #f39c12;
            color: white;
            padding: 4px 10px;
            border-radius: 12px;
            font-weight: bold;
        }

        .difficulty-badge.easy {
            background: #2ecc71;
        }

        .difficulty-badge.hard {
            background: #e74c3c;
        }

        .learn-btn {
            background: var(--primary);
            color: white;
            padding: 8px 16px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        .learn-btn:hover {
            background: var(--accent);
            color: var(--primary);
        }

        /* ========== 详情页 ========== */
        .detail-content {
            padding: 40px;
            max-height: 80vh;
            overflow-y: auto;
        }

        .back-button {
            background: var(--primary);
            color: white;
            padding: 10px 20px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            font-weight: bold;
            margin-bottom: 30px;
            font-family: inherit;
            font-size: 1em;
            transition: all 0.3s ease;
        }

        .back-button:hover {
            background: var(--secondary);
            transform: translateX(-5px);
        }

        .detail-title {
            font-size: 2.2em;
            font-weight: bold;
            color: var(--primary);
            margin-bottom: 10px;
        }

        .detail-english {
            font-size: 1.1em;
            color: #999;
            font-style: italic;
            margin-bottom: 30px;
        }

        .detail-meta {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .section {
            margin-bottom: 35px;
        }

        .section-title {
            font-size: 1.3em;
            font-weight: bold;
            color: var(--primary);
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 3px solid var(--accent);
        }

        .concept-explanation {
            background: #f9f9f9;
            padding: 20px;
            border-radius: 8px;
            border-left: 4px solid var(--secondary);
            line-height: 1.8;
            font-size: 0.95em;
            margin-bottom: 20px;
        }

        .syntax-block {
            background: #1e1e1e;
            color: #d4d4d4;
            padding: 20px;
            border-radius: 8px;
            margin: 15px 0;
            font-size: 0.9em;
            overflow-x: auto;
            border: 1px solid #333;
            line-height: 1.6;
        }

        .key-points {
            background: #e8f5e9;
            padding: 20px;
            border-radius: 8px;
            border-left: 4px solid var(--success);
        }

        .key-points li {
            margin: 10px 0;
            line-height: 1.6;
            color: #333;
        }

        .example-section {
            background: linear-gradient(to right, #f0f7ff, #f5f9ff);
            padding: 20px;
            border-radius: 8px;
            border-left: 4px solid #2196f3;
            margin: 20px 0;
        }

        .example-title {
            font-weight: bold;
            color: #1565c0;
            margin-bottom: 15px;
            font-size: 1.05em;
        }

        .example-code {
            background: #1e1e1e;
            color: #d4d4d4;
            padding: 15px;
            border-radius: 6px;
            font-size: 0.85em;
            margin: 12px 0;
            overflow-x: auto;
            border: 1px solid #333;
            line-height: 1.5;
        }

        .explanation-text {
            color: #555;
            font-size: 0.95em;
            line-height: 1.7;
            margin-top: 12px;
            background: white;
            padding: 12px;
            border-radius: 4px;
        }

        .alert {
            padding: 15px;
            border-radius: 6px;
            margin: 15px 0;
            border-left: 4px solid;
            font-size: 0.95em;
            line-height: 1.6;
        }

        .alert-warning {
            background: #fffbea;
            border-left-color: #ff6b35;
            color: #ad3c00;
        }

        .alert-tip {
            background: #f0f8ff;
            border-left-color: #00a8e8;
            color: #0056b3;
        }

        .alert-important {
            background: #ffe6e6;
            border-left-color: #e74c3c;
            color: #721c24;
        }

        .mistakes-section {
            background: #ffebee;
            padding: 20px;
            border-radius: 8px;
            border-left: 4px solid var(--danger);
        }

        .mistakes-title {
            font-weight: bold;
            color: var(--danger);
            margin-bottom: 15px;
            font-size: 1.05em;
        }

        .mistake-item {
            margin: 15px 0;
            padding: 15px;
            background: white;
            border-radius: 6px;
            border-left: 3px solid var(--danger);
        }

        .mistake-label {
            color: var(--danger);
            font-weight: bold;
            margin-bottom: 8px;
        }

        .related-section {
            background: #f0f7ff;
            padding: 20px;
            border-radius: 8px;
            border-left: 4px solid var(--secondary);
        }

        .related-title {
            font-weight: bold;
            color: var(--secondary);
            margin-bottom: 12px;
        }

        .related-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .related-tag {
            background: var(--secondary);
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.9em;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .related-tag:hover {
            background: var(--accent);
            color: var(--primary);
            transform: scale(1.08);
        }

        .no-results {
            grid-column: 1 / -1;
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }

        footer {
            background: linear-gradient(to bottom, #f8f9fa, #e8eaed);
            text-align: center;
            padding: 25px;
            color: #666;
            border-top: 2px solid #e0e0e0;
            font-size: 0.9em;
        }

        /* ========== Responsive ========== */
        @media (max-width: 1024px) {
            .index-content {
                grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            }
        }

        @media (max-width: 768px) {
            header h1 {
                font-size: 2em;
            }

            .index-content {
                grid-template-columns: 1fr;
                padding: 15px;
            }

            .detail-content {
                padding: 20px;
            }

            .controls {
                flex-direction: column;
            }

            .search-box, .category-filter, .difficulty-filter {
                width: 100%;
            }

            .detail-title {
                font-size: 1.6em;
            }

            .section-title {
                font-size: 1.1em;
            }
        }
    </style>
</head>
<body>
    <div class="container">

            <div class="description">
                从零基础到竞赛高手 | 掌握每一个知识点的深层原理 | 培养竞赛思维和代码品质

        <div class="breadcrumb" id="breadcrumb">

        <!-- ========== 首页（大纲视图） ========== -->
        <div id="indexPage">
            <div class="controls">
                <input type="text" id="searchBox" class="search-box" placeholder="🔍 搜索知识点...">
                <select id="categoryFilter" class="category-filter">
                    <option value="">📚 全部分类</option>
                    <option value="basic">🔧 基础概念</option>

                    <option value="control">🎯 控制语句</option>

                <select id="difficultyFilter" class="difficulty-filter">

                    <option value="easy">⭐ 基础</option>
                    <option value="medium">⭐⭐ 进阶</option>
                    <option value="hard">⭐⭐⭐ 高难</option>
                </select>
            </div>

            <div class="index-content" id="indexContent"></div>
        </div>

        <!-- ========== 详情页 ========== -->
        <div id="detailPage">
            <div class="detail-content" id="detailContent"></div>
        </div>

        <footer>
            <p>💡 <strong>竞赛秘诀</strong>：不仅要会写代码，更要理解每一行代码的原理。</p>
            <p>📖 持续学习、多做题目、反复总结 - 这是成为竞赛高手的必经之路。</p>
        </footer>
    </div>

                explanation: `程序是一组按指定顺序执行的指令集合。在竞赛中，程序通过逐行执行代码来完成计算任务。理解程序的执行流程是学习编程的第一步。`,

                explanation2: "函数的设计要遵循单一职责原则：每个函数只做一件事。好的函数设计能让代码更易读、更易维护。",
                tips: [
                    "竞赛中经常用函数来实现特定算法（如排序、搜索等）",
                    "函数名要有意义，能表达函数的功能",
                    "避免过度的函数调用层次，深层调用会增加开销",
                    "递归函数要确保有 base case（基础情况），否则无限递归"
                ],
                commonMistakes: [
                    {
                        mistake: "返回类型与 return 语句的类型不匹配",
                        impact: "可能导致类型转换或值丢失",
                        solution: "确保 return 语句的类型与函数的返回类型一致"
                    },
                    {
                        mistake: "在 void 函数中写 return 值;",
                        impact: "编译错误",
                        solution: "void 函数可以写 return; 但不能 return 值;"
                    }
                ],
                relatedConcepts: ["参数", "返回值", "递归"]
            },

            {
                id: 12,
                title: "标准库和 cin/cout",
                english: "Standard Library",
                category: "function",
                difficulty: "easy",
                preview: "iostream 库提供输入输出功能。是竞赛程序必不可少的。",
                explanation: `iostream 是 C++ 标准库中的输入输出库。提供 cin、cout 等对象，用于与用户交互。几乎所有竞赛程序都需要这个库。`,
                syntax: `#include <iostream>
using namespace std;

// 输入
cin >> 变量;

// 输出
cout << 值;

// 换行
cout << endl;`,
                keyPoints: [
                    "#include <iostream> 是竞赛代码的必需部分",
                    "using namespace std; 让我们省略 std:: 前缀",
                    "cin 可以连续读取多个值：cin >> a >> b >> c;",
                    "cout 可以连续输出：cout << a << \" \" << b << endl;"
                ],
                example: `#include <iostream>
using namespace std;

int main() {
    // 基本输入输出
    int a, b;
    cout << "请输入两个整数: ";
    cin >> a >> b;
    
    cout << "你输入的是: " << a 
         << " 和 " << b << endl;
    
    // 格式化输出
    double pi = 3.14159;
    cout << "π ≈ " << pi << endl;
    
    // 多行输出
    for (int i = 1; i <= 3; i++) {
        cout << "第 " << i << " 行" << endl;
    }
    
    return 0;
}`,
                explanation2: "iostream 库是竞赛编程的基础，几乎所有程序都需要用到。理解如何正确使用 cin 和 cout 非常重要。",
                tips: [
                    "竞赛中可以加速 IO：ios::sync_with_stdio(false);",
                    "endl 会刷新缓冲区，比 '\\n' 慢，大量输出时用 '\\n'",
                    "cout << fixed << setprecision(6) 控制浮点数输出",
                    "记住输入输出的格式必须与题目要求完全一致"
                ],
                commonMistakes: [
                    {
                        mistake: "忘记 #include <iostream>",
                        impact: "编译错误，cin/cout 未定义",
                        solution: "任何使用 cin/cout 的程序都需要包含 iostream"
                    },
                    {
                        mistake: "大量输出时用 endl",
                        impact: "每个 endl 都刷新缓冲区，程序变慢，可能 TLE",
                        solution: "改用 '\\n'，或在程序开头关闭同步"
                    }
                ],
                relatedConcepts: ["输入输出", "程序框架", "库函数"]
            }
        ];

        let currentCards = [...dictionary];

        const categoryNames = {
            'basic': '🔧 基础概念',
            'data': '📊 数据类型',
            'control': '🎯 控制语句',
            'function': '⚙️ 函数与库'
        };

        const difficultyNames = {
            'easy': '⭐ 基础',
            'medium': '⭐⭐ 进阶',
            'hard': '⭐⭐⭐ 高难'
        };

        // ========== 首页渲染 ==========
        function renderIndex() {
            const indexContent = document.getElementById('indexContent');
            indexContent.innerHTML = '';
            
            if (currentCards.length === 0) {
                indexContent.innerHTML = '<div class="no-results"><div class="no-results-icon">🔍</div><div class="no-results-text">没有找到匹配的知识点</div></div>';
                return;
            }

            currentCards.forEach(item => {
                const card = document.createElement('div');
                card.className = `topic-card category-${item.category}`;
                
                card.innerHTML = `
                    <div class="topic-card-header">
                        <span class="topic-badge">${categoryNames[item.category]}</span>
                        <div class="topic-card-title">${item.title}</div>
                        <div class="topic-card-english">${item.english}</div>
                    </div>
                    <div class="topic-card-body">
                        <div class="topic-preview">${item.preview}</div>
                        <div class="topic-meta">
                            <span class="difficulty-badge ${item.difficulty}">${difficultyNames[item.difficulty]}</span>
                            <button class="learn-btn" onclick="viewDetail(${item.id})">查看详情 →</button>
                        </div>
                    </div>
                `;
                
                card.onclick = (e) => {
                    if (!e.target.classList.contains('learn-btn')) {
                        viewDetail(item.id);
                    }
                };
                
                indexContent.appendChild(card);
            });
        }

        // ========== 详情页渲染 ==========
        function renderDetail(item) {
            let html = `
                <button class="back-button" onclick="goToIndex()">← 返回首页</button>
                
                <div class="detail-title">${item.title}</div>
                <div class="detail-english">${item.english}</div>
                
                <div class="detail-meta">
                    <span class="topic-badge">${categoryNames[item.category]}</span>
                    <span class="difficulty-badge ${item.difficulty}">${difficultyNames[item.difficulty]}</span>
                </div>

                <div class="section">
                    <div class="section-title">📖 核心概念</div>
                    <div class="concept-explanation">${item.explanation}</div>
                </div>

                <div class="section">
                    <div class="section-title">💻 语法格式</div>
                    <div class="syntax-block"><pre>${escapeHtml(item.syntax)}</pre></div>
                </div>

                <div class="section">
                    <div class="section-title">🎯 核心要点</div>
                    <div class="key-points">
                        <ul>
                            ${item.keyPoints.map(point => `<li>${point}</li>`).join('')}
                        </ul>
                    </div>
                </div>

                <div class="section">
                    <div class="example-section">
                        <div class="example-title">💡 完整代码示例</div>
                        <div class="example-code"><pre>${escapeHtml(item.example)}</pre></div>
                        <div class="explanation-text">${item.explanation2}</div>
                    </div>
                </div>
            `;

            if (item.commonMistakes && item.commonMistakes.length > 0) {
                html += `
                    <div class="section">
                        <div class="section-title">❌ 常见错误</div>
                        <div class="mistakes-section">
                            ${item.commonMistakes.map(m => `
                                <div class="mistake-item">
                                    <div class="mistake-label">错误：${m.mistake}</div>
                                    <div class="explanation-text"><strong>💥 影响：</strong>${m.impact}</div>
                                    <div class="explanation-text"><strong>✅ 解决：</strong>${m.solution}</div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            }

            if (item.tips && item.tips.length > 0) {
                html += `
                    <div class="section">
                        <div class="section-title">⚡ 竞赛技巧</div>
                        <div class="alert alert-tip">
                            <ul>
                                ${item.tips.map(tip => `<li>${tip}</li>`).join('')}
                            </ul>
                        </div>
                    </div>
                `;
            }

            if (item.relatedConcepts && item.relatedConcepts.length > 0) {
                html += `
                    <div class="section">
                        <div class="section-title">🔗 相关概念</div>
                        <div class="related-section">
                            <div class="related-tags">
                                ${item.relatedConcepts.map(concept => `
                                    <span class="related-tag" onclick="searchConcept('${concept}')">${concept}</span>
                                `).join('')}
                            </div>
                        </div>
                    </div>
                `;
            }

            document.getElementById('detailContent').innerHTML = html;
        }

        function escapeHtml(text) {
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return text.replace(/[&<>"']/g, m => map[m]);
        }

        // ========== 页面切换 ==========
        window.goToIndex = function() {
            document.getElementById('indexPage').style.display = 'block';
            document.getElementById('detailPage').style.display = 'none';
            document.getElementById('breadcrumb').classList.remove('show');
            renderIndex();
        };

        window.viewDetail = function(id) {
            const item = dictionary.find(d => d.id === id);
            if (item) {
                renderDetail(item);
                document.getElementById('indexPage').style.display = 'none';
                document.getElementById('detailPage').style.display = 'block';
                document.getElementById('breadcrumb').classList.add('show');
                document.getElementById('currentTopic').textContent = item.title;
                window.scrollTo(0, 0);
            }
        };

        window.searchConcept = function(concept) {
            document.getElementById('searchBox').value = concept;
            filterCards();
            goToIndex();
        };

        // ========== 过滤功能 ==========
        function filterCards() {
            const searchTerm = document.getElementById('searchBox').value.toLowerCase();
            const selectedCategory = document.getElementById('categoryFilter').value;
            const selectedDifficulty = document.getElementById('difficultyFilter').value;

            currentCards = dictionary.filter(item => {
                const matchesSearch = item.title.toLowerCase().includes(searchTerm) ||
                                    item.english.toLowerCase().includes(searchTerm) ||
                                    item.preview.toLowerCase().includes(searchTerm);
                
                const matchesCategory = !selectedCategory || item.category === selectedCategory;
                const matchesDifficulty = !selectedDifficulty || item.difficulty === selectedDifficulty;

                return matchesSearch && matchesCategory && matchesDifficulty;
            });

            renderIndex();
        }

        document.getElementById('searchBox').addEventListener('input', filterCards);
        document.getElementById('categoryFilter').addEventListener('change', filterCards);
        document.getElementById('difficultyFilter').addEventListener('change', filterCards);

        // 初始渲染
        renderIndex();
    </script>
</body>
</html>
